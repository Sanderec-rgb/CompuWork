<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Empleado - CompuWork</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h4> <i class="fas fa-user-plus"></i> Registrar Nuevo Empleado</h4>
                    </div>
                    <div class="card-body">
                        <form action="/compuwork/employees" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nombre:</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Apellido:</label>
                                <input type="text" name="apellido" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email:</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telefono:</label>
                                <input type="tel" name="telefono" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Puntuacion Desempeno (0-10):</label>
                                <input type="number" step="0.1" name="puntuacionDesempeno" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary"> <i class="fas fa-save"></i> Guardar</button>
                            <a href="/compuwork/employees" class="btn btn-secondary"> <i class="fas fa-times"></i> Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
