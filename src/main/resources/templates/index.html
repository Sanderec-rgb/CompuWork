<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"> 
<head> 
    <meta charset="UTF-8"> 
    <title>CompuWork - Sistema RH</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head> 
<body> 
    <div class="container mt-5"> 
        <div class="card"> 
            <div class="card-header bg-primary text-white"> 
                <h2>Sistema de Gestion CompuWork</h2> 
            </div> 
            <div class="card-body"> 
                <div class="row"> 
                    <div class="col-md-4 mb-3"> 
                        <div class="card text-center"> 
                            <div class="card-body"> 
                                <h5 class="card-title">Empleados</h5> 
                                <p class="card-text">Gestionar empleados permanentes y temporales</p> 
                                <a th:href="@{/employees}" class="btn btn-primary">Gestionar</a> 
                            </div> 
                        </div> 
                    </div> 
                    <div class="col-md-4 mb-3"> 
                        <div class="card text-center"> 
                            <div class="card-body"> 
                                <h5 class="card-title">Departamentos</h5> 
                                <p class="card-text">Gestionar departamentos de la empresa</p> 
                                <a th:href="@{/departments}" class="btn btn-success">Gestionar</a> 
                            </div> 
                        </div> 
                    </div> 
                    <div class="col-md-4 mb-3"> 
                        <div class="card text-center"> 
                            <div class="card-body"> 
                                <h5 class="card-title">Reportes</h5> 
                                <p class="card-text">Ver reportes de desempeno</p> 
                                <a href="/compuwork/reports" class="btn btn-info">Ver Reportes</a>
                            </div> 
                        </div> 
                    </div> 
                </div> 
            </div> 
        </div> 
    </div> 
</body> 
</html>
