<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Error - CompuWork</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
</head> 
<body> 
    <div class="container mt-5"> 
        <div class="row justify-content-center"> 
            <div class="col-md-6"> 
                <div class="card border-danger"> 
                    <div class="card-header bg-danger text-white"> 
                        <h4> <i class="fas fa-exclamation-triangle"></i> <span th:text="${titulo}">Error</span></h4> 
                    </div> 
                    <div class="card-body"> 
                        <div class="alert alert-danger"> 
                            <i class="fas fa-times-circle"></i> <span th:text="${error}">Mensaje de error</span> 
                        </div> 
                        <a th:href="@{/}" class="btn btn-primary"> <i class="fas fa-home"></i> Volver al Inicio</a> 
                        <a href="javascript:history.back()" class="btn btn-secondary"> <i class="fas fa-arrow-left"></i> Volver Atras</a> 
                    </div> 
                </div> 
            </div> 
        </div> 
    </div> 
</body> 
</html>
