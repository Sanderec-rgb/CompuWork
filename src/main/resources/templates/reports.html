<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reportes de Desempeño - CompuWork</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3> <i class="fas fa-chart-bar"></i> Reportes de Desempeño</h3>
            </div>
            <div class="card-body">
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h5>Total Empleados</h5>
                                <h2 class="text-primary" th:text="${totalEmpleados}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-light">
                            <div class="card-body text-center">
                                <h5>Promedio General</h5>
                                <h2 class="text-success" th:text="${#numbers.formatDecimal(promedioGeneral, 1, 2)}">0.00</h2>
                            </div>
                        </div>
                    </div>
                </div>
                
                <h4>Reportes Individuales</h4>
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Empleado</th>
                            <th>Puntuación</th>
                            <th>Evaluación</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="report : ${reports}">
                            <td th:text="${report.empleado}"></td>
                            <td th:text="${report.puntuacion}"></td>
                            <td>
                                <span th:text="${report.evaluacion}" 
                                      th:classappend="${report.evaluacion == 'Excelente'} ? 'badge bg-success' : 
                                                     ${report.evaluacion == 'Bueno'} ? 'badge bg-primary' :
                                                     ${report.evaluacion == 'Regular'} ? 'badge bg-warning' : 
                                                     'badge bg-danger'">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/employees/report/{id}(id=${report.id})}" class="btn btn-sm btn-info">Ver Detalle</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <a th:href="@{/}" class="btn btn-secondary mt-3"> <i class="fas fa-home"></i> Volver al Inicio</a>
            </div>
        </div>
    </div>
</body>
</html>
