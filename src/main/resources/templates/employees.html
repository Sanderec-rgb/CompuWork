<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Gestion de Empleados - CompuWork</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
</head> 
<body> 
    <div class="container mt-4"> 
        <div class="card"> 
            <div class="card-header bg-primary text-white"> 
                <h3> <i class="fas fa-users"></i> Gestion de Empleados</h3> 
            </div> 
            <div class="card-body"> 
                <a th:href="@{/employees/new}" class="btn btn-success mb-3"> <i class="fas fa-plus"></i> Nuevo Empleado</a> 
                <a th:href="@{/}" class="btn btn-secondary mb-3"> <i class="fas fa-home"></i> Inicio</a> 
 
                <table class="table table-striped table-hover"> 
                    <thead class="table-dark"> 
                        <tr> 
                            <th>ID</th> 
                            <th>Nombre</th> 
                            <th>Apellido</th> 
                            <th>Email</th> 
                            <th>Telefono</th> 
                            <th>Departamento</th> 
                            <th>Puntuacion</th> 
                            <th>Acciones</th> 
                        </tr> 
                    </thead> 
                    <tbody> 
                        <tr th:each="emp : ${employees}"> 
                            <td th:text="${emp.id}"></td> 
                            <td th:text="${emp.nombre}"></td> 
                            <td th:text="${emp.apellido}"></td> 
                            <td th:text="${emp.email}"></td> 
                            <td th:text="${emp.telefono}"></td> 
                            <td th:text="${emp.department != null ? emp.department.nombre : 'Sin asignar'}"></td> 
                            <td> 
                                <span th:if="${emp.puntuacionDesempeno != null}" th:text="${emp.puntuacionDesempeno}"></span> 
                                <span th:unless="${emp.puntuacionDesempeno != null}" class="text-muted">No evaluado</span> 
                            </td> 
                            <td> 
                                <a th:href="@{/employees/report/{id}(id=${emp.id})}" class="btn btn-sm btn-info"> <i class="fas fa-chart-line"></i> Reporte</a> 
                                <a th:href="@{/employees/delete/{id}(id=${emp.id})}" class="btn btn-sm btn-danger" onclick="return confirm('�Eliminar este empleado?')"> <i class="fas fa-trash"></i> Eliminar</a> 
                            </td> 
                        </tr> 
                        <tr th:if="${employees.isEmpty()}"> 
                            <td colspan="8" class="text-center text-muted">No hay empleados registrados</td> 
                        </tr> 
                    </tbody> 
                </table> 
            </div> 
        </div> 
    </div> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/employees.js}"></script>
</body> 
</html>
